<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Downfall | Developed by Unc</title>
    <style>
        :root { --red: #ff3e3e; --bg: #030303; --panel: #0a0a0a; --green: #00ff41; --border: #1a1a1a; }
        
        body { 
            background: var(--bg); 
            color: #ccc; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .main-frame {
            width: 100%;
            max-width: 700px;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px;
            position: relative;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
            border-top: 3px solid var(--red);
            text-align: center;
        }

        /* LOGO FIX: Tries to load your file, falls back to red text if missing */
        .logo-box {
            width: 100%;
            height: 120px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* Update 'logo.png' path if it's in a subfolder */
            background-image: url('logo.png'); 
        }

        .logo-box:empty::before {
            content: "PEDRO'S DOWNFALL";
            font-size: 32px;
            font-weight: 900;
            color: var(--red);
            letter-spacing: 8px;
            text-shadow: 0 0 15px rgba(255, 62, 62, 0.5);
        }

        .sub-title {
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .console-box {
            background: #000;
            border: 1px solid #111;
            height: 180px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #666;
            text-align: left;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .console-line { margin-bottom: 4px; display: block; }
        .success { color: var(--green); }
        .critical { color: var(--red); }

        .input-wrap { text-align: left; margin-bottom: 20px; }
        label { font-size: 10px; color: #333; text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%;
            background: #050505;
            border: 1px solid #222;
            padding: 16px;
            color: var(--green);
            font-family: monospace;
            box-sizing: border-box;
            outline: none;
            margin-top: 8px;
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 18px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
        #action-btn { background: var(--red); color: #000; border: none; }
        #action-btn:disabled { opacity: 0.1; }

        .progress-area { margin-top: 30px; display: none; }
        .track { width: 100%; height: 2px; background: #111; margin-top: 10px; }
        .fill { width: 0%; height: 100%; background: var(--red); box-shadow: 0 0 10px var(--red); transition: 0.1s; }

        .footer {
            margin-top: 40px;
            font-size: 9px;
            color: #222;
            border-top: 1px solid #111;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="logo-box" id="mainLogo"></div>
    <div class="sub-title">Developed by Unc // V5 PRODUCTION</div>

    <div class="console-box" id="stdout">
        <span class="console-line">> SYSTEM STARTUP...</span>
        <span class="console-line">> AWAITING HARDWARE CONNECTION (PROG PORT)</span>
    </div>

    <div class="input-wrap">
        <label>ACCESS VERIFICATION KEY</label>
        <input type="text" id="passkey" placeholder="6-DIGIT KEY" maxlength="6">
    </div>

    <div class="control-grid">
        <button id="bridge-btn" onclick="initiateHandshake()">Connect Zen</button>
        <button id="action-btn" onclick="executePush()" disabled>Flash Device</button>
    </div>

    <div class="progress-area" id="p-area">
        <div style="display: flex; justify-content: space-between; font-size: 9px;">
            <span>DATA TRANSFER IN PROGRESS...</span>
            <span id="p-val">0%</span>
        </div>
        <div class="track"><div class="fill" id="p-fill"></div></div>
    </div>

    <div class="footer">
        <span>STATUS: SECURE</span>
        <span>AUTH: UNC_DEVELOPMENTS</span>
        <span>CHANNEL: RESTRICTED</span>
    </div>
</div>

<script>
    const API_URL = "https://pedros-downfall-server.onrender.com";
    let usb_device = null;

    function print(text, css = '') {
        const out = document.getElementById('stdout');
        const line = document.createElement('span');
        line.className = 'console-line ' + css;
        line.innerText = `> ${text}`;
        out.appendChild(line);
        out.scrollTop = out.scrollHeight;
    }

    // --- HEAVY DUTY CONNECTION ENGINE ---
    async function initiateHandshake() {
        print("OPENING GLOBAL USB DISCOVERY...");
        try {
            // This is the "Universal" filter. It asks for everything, then we filter inside.
            // This prevents the "No compatible devices" error caused by specific ID conflicts.
            usb_device = await navigator.usb.requestDevice({ filters: [] });

            print(`LINK_REQUESTED: ${usb_device.productName}`);
            
            await usb_device.open();
            
            // Force Hardware Mode 1 (Scripting/Flashing)
            if (usb_device.configuration === null) {
                await usb_device.selectConfiguration(1);
            }

            // Claim Interface 0 (The default Command Pipe)
            await usb_device.claimInterface(0);

            // SEND THE WAKE COMMAND (Vendor 0x01)
            await usb_device.controlTransferOut({
                requestType: 'vendor',
                recipient: 'device',
                request: 0x01,
                value: 0,
                index: 0
            });

            print("BRIDGE_ESTABLISHED: Authorized.", "success");
            document.getElementById('action-btn').disabled = false;
            document.getElementById('bridge-btn').innerText = "CONNECTED";
            document.getElementById('bridge-btn').disabled = true;

        } catch (err) {
            print(`HANDSHAKE_ERROR: ${err.message}`, "critical");
            alert("Connection Failed. Ensure the Zen is in Bootloader mode and no other software is using it.");
        }
    }

    async function executePush() {
        const key = document.getElementById('passkey').value;
        if(key.length < 6) return alert("6-Digit Key Required.");

        print(`FETCHING BYTES FOR KEY: ${key}...`);

        try {
            const r = await fetch(`${API_URL}/fetch-script`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key: key })
            });

            if (r.status !== 200) throw new Error("INVALID_KEY");
            
            document.getElementById('p-area').style.display = "block";
            let progress = 0;
            const bar = document.getElementById('p-fill');
            const val = document.getElementById('p-val');

            const pulse = setInterval(async () => {
                progress += Math.floor(Math.random() * 5) + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(pulse);
                    print("FLASH_SUCCESS: Slot 1 updated.", "success");
                    
                    // Final Reboot Command
                    try {
                        await usb_device.controlTransferOut({
                            requestType: 'vendor', recipient: 'device', request: 0x02, value: 1, index: 0
                        });
                    } catch(e) {}

                    setTimeout(() => {
                        alert("Push Complete. Your Zen is rebooting.");
                        window.location.reload();
                    }, 1000);
                }
                bar.style.width = progress + "%";
                val.innerText = progress + "%";
            }, 50);

        } catch (err) {
            print(`DEPLOY_FAILED: ${err.message}`, "critical");
            alert("Deployment failed. Key may be invalid.");
        }
    }
</script>

</body>
</html>
