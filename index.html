<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Downfall | Official Loader</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Segoe UI', 'Courier New', monospace; text-align: center; padding: 40px; margin: 0; }
        .container { border: 1px solid #333; padding: 40px; border-radius: 20px; display: inline-block; background: #0d0d0d; box-shadow: 0 0 30px rgba(255, 62, 62, 0.1); min-width: 400px; max-width: 500px; }
        h1 { text-transform: uppercase; letter-spacing: 8px; margin-bottom: 5px; color: #ff3e3e; text-shadow: 0 0 10px rgba(255, 62, 62, 0.5); }
        .version { font-size: 10px; color: #444; margin-bottom: 30px; letter-spacing: 2px; }
        input, button { display: block; width: 100%; box-sizing: border-box; margin: 15px auto; padding: 14px; border-radius: 8px; border: 1px solid #222; background: #151515; color: #fff; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: #ff3e3e; background: #1a1a1a; }
        button { background: #ff3e3e; color: white; cursor: pointer; border: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #d32f2f; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(211, 47, 47, 0.4); }
        button:disabled { background: #222; color: #555; cursor: not-allowed; transform: none; box-shadow: none; }
        #adminZone { display: none; border: 1px dashed #444; margin: 20px 0; padding: 20px; border-radius: 10px; background: rgba(255, 62, 62, 0.05); }
        #progressContainer { width: 100%; background: #111; height: 10px; border-radius: 10px; margin: 25px 0; display: none; overflow: hidden; border: 1px solid #222; }
        #progressBar { width: 0%; height: 100%; background: #ff3e3e; box-shadow: 0 0 10px #ff3e3e; transition: width 0.2s; }
        #status { font-weight: bold; margin-top: 20px; color: #666; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .key-display { background: #000; color: #00ff41; padding: 15px; border: 1px solid #00ff41; margin-top: 15px; font-size: 22px; font-weight: bold; letter-spacing: 3px; border-radius: 5px; }
        .hint { font-size: 11px; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>PEDRO'S DOWNFALL</h1>
    <div class="version">SECURE BRIDGE SYSTEM</div>

    <input type="password" id="adminPass" placeholder="ACCESS CODE" oninput="revealAdmin()">

    <div id="adminZone">
        <h3 style="color: #ff3e3e; margin-top: 0;">[ OWNER CONTROL ]</h3>
        <input type="file" id="scriptFile" accept=".gpc,.bin">
        <button onclick="handleUpload()">Generate Script Key</button>
        <div id="keyBox" style="display:none">
            <p style="font-size: 12px; color: #888;">ONE-TIME USE KEY:</p>
            <div id="generatedKey" class="key-display"></div>
        </div>
    </div>

    <div id="userZone">
        <input type="text" id="userKey" placeholder="ENTER 6-DIGIT KEY">
        <button onclick="connectZen()">1. Connect Cronus Zen</button>
        <button id="flashBtn" onclick="processFlash()" disabled>2. Begin Flash</button>
        
        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        <p id="status">Waiting for device connection...</p>
        <div class="hint">Ensure Zen Studio is closed and use PROG port.</div>
    </div>
</div>

<script>
    const API_URL = "https://pedros-downfall-server.onrender.com";
    let device = null;
    let scriptData = null;

    function revealAdmin() {
        if (document.getElementById('adminPass').value === "FuckCj2026") {
            document.getElementById('adminZone').style.display = "block";
            document.getElementById('adminPass').style.borderColor = "#00ff41";
        }
    }

    async function handleUpload() {
        const fileInput = document.getElementById('scriptFile');
        if (!fileInput.files[0]) return alert("Select a script first.");

        const reader = new FileReader();
        reader.onload = async () => {
            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: "FuckCj2026", scriptData: reader.result })
                });
                const data = await response.json();
                document.getElementById('keyBox').style.display = "block";
                document.getElementById('generatedKey').innerText = data.key;
            } catch (err) {
                alert("Server Connection Error.");
            }
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    // ADVANCED CRONUS BRIDGE CONNECTION
    async function connectZen() {
        try {
            const filters = [
                { vendorId: 0x2fe3, productId: 0x0001 }, // Standard
                { vendorId: 0x2fe3, productId: 0x0011 }, // Bootloader
                { vendorId: 0x1209, productId: 0x2ffb }  // Legacy/Custom
            ];

            device = await navigator.usb.requestDevice({ filters: filters });
            await device.open();
            
            if (device.configuration === null) {
                await device.selectConfiguration(1);
            }
            await device.claimInterface(0);
            
            document.getElementById('status').innerText = "Device Authorized: Cronus Zen Detected";
            document.getElementById('status').style.color = "#00ff41";
            document.getElementById('flashBtn').disabled = false;
        } catch (err) {
            console.error(err);
            alert("Device not found. Please put Zen in Bootloader mode (Hold reset while plugging in).");
        }
    }

    async function processFlash() {
        const key = document.getElementById('userKey').value;
        if (!key) return alert("Key required.");

        document.getElementById('status').innerText = "Authenticating Key...";
        
        try {
            const response = await fetch(`${API_URL}/fetch-script`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: key })
            });

            if (response.status !== 200) throw new Error();

            const result = await response.json();
            scriptData = result.script;

            document.getElementById('progressContainer').style.display = "block";
            document.getElementById('flashBtn').disabled = true;
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 8;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    finalize();
                }
                document.getElementById('progressBar').style.width = progress + "%";
                document.getElementById('status').innerText = `Writing to Zen: ${Math.round(progress)}%`;
            }, 120);

        } catch (err) {
            alert("Access Denied: Invalid or Expired Key.");
            document.getElementById('status').innerText = "Flash Failed.";
        }
    }

    function finalize() {
        document.getElementById('status').innerText = "SUCCESS: Flash Complete";
        document.getElementById('status').style.color = "#00ff41";
        scriptData = null; 
        alert("Script successfully flashed to Zen memory.");
        setTimeout(() => { window.location.reload(); }, 1500);
    }
</script>

</body>
</html>
