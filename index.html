<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Downfall | Developed by Unc</title>
    <style>
        :root { --red: #ff3e3e; --bg: #050505; --green: #00ff41; --panel: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .wrapper { max-width: 550px; margin: 40px auto; background: var(--panel); border: 1px solid #222; border-radius: 12px; padding: 35px; box-shadow: 0 10px 60px rgba(255, 62, 62, 0.08); }
        .logo-container { width: 100%; max-width: 400px; margin: 0 auto 30px auto; display: block; }
        .logo-img { width: 100%; height: auto; display: block; }
        
        input, button { width: 100%; padding: 16px; margin: 12px 0; border-radius: 6px; border: 1px solid #222; background: #111; color: white; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--red); background: #161616; }
        
        button { background: var(--red); font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        button:hover:not(:disabled) { background: #e63535; transform: translateY(-1px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        #statusBox { margin-top: 25px; font-size: 12px; color: #666; letter-spacing: 1px; border-top: 1px solid #1a1a1a; padding-top: 20px; text-transform: uppercase; }
        .p-wrap { width: 100%; height: 6px; background: #1a1a1a; border-radius: 10px; margin: 20px 0; display: none; overflow: hidden; }
        .p-bar { width: 0%; height: 100%; background: var(--red); box-shadow: 0 0 10px var(--red); }
        
        .instructions { font-size: 11px; color: #444; margin-top: 20px; line-height: 1.8; text-align: left; background: #111; padding: 15px; border-radius: 6px; }
        .highlight { color: var(--red); font-weight: bold; }
        .footer-credit { margin-top: 25px; font-size: 10px; color: #333; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="logo-container">
        <img src="logo.png" alt="Pedro's Downfall | Developed by Unc" class="logo-img">
    </div>

    <div id="userArea">
        <input type="text" id="userKey" placeholder="6-DIGIT SCRIPT KEY">
        <button id="connBtn" onclick="connectZenBridge()">1. Connect Cronus Zen</button>
        <button id="flashBtn" onclick="pushGPC()" disabled>2. Start Flash Sequence</button>

        <div class="p-wrap" id="pWrap">
            <div class="p-bar" id="pBar"></div>
        </div>

        <div id="statusBox">BRIDGE STATUS: DISCONNECTED</div>
    </div>

    <div class="instructions">
        <strong>ZERO-DRIVER CONNECTION:</strong><br>
        1. Use the <span class="highlight">PROG Port</span> (Right Side).<br>
        2. Ensure <span class="highlight">Zen Studio</span> is closed.<br>
        3. No extra software or drivers required.
    </div>
    
    <div class="footer-credit">© 2026 | Developed by Unc</div>
</div>

<script>
    const API = "https://pedros-downfall-server.onrender.com";
    let device = null;

    // THE ZERO-DRIVER HANDSHAKE (REVERSE ENGINEERED)
    async function connectZenBridge() {
        const status = document.getElementById('statusBox');
        status.innerText = "OPENING SECURE BRIDGE...";

        try {
            // This filter targets the VENDOR-SPECIFIC interface (0xFF00) 
            // This is how the browser talks to HID without needing WinUSB/Zadig.
            const filters = [
                { vendorId: 0x2fe3, productId: 0x0001 }, // Standard Zen
                { vendorId: 0x2fe3, productId: 0x0011 }, // Bootloader Zen
                { vendorId: 0x1209, productId: 0x2ffb }  // Recovery Mode
            ];

            device = await navigator.usb.requestDevice({ filters: filters });
            
            await device.open();
            
            // Critical Step: Force Configuration 1 which resets the HID Report Map
            await device.selectConfiguration(1);

            // We iterate through interfaces to find the Vendor-Specific one (Class 255)
            let dataInterface = -1;
            for (const config of device.configurations) {
                for (const iface of config.interfaces) {
                    if (iface.alternate.interfaceClass === 255) { // 255 = Vendor Specific
                        dataInterface = iface.interfaceNumber;
                        break;
                    }
                }
            }

            if (dataInterface === -1) dataInterface = 0; // Fallback to 0 if 255 isn't explicitly flagged

            await device.claimInterface(dataInterface);

            // SENDING THE UNLOCK PING (This is the CMind Handshake)
            // It tells the device "I am an authorized web portal"
            await device.controlTransferOut({
                requestType: 'vendor',
                recipient: 'device',
                request: 0x01,
                value: 0x0000,
                index: 0x0000
            });

            status.innerText = "BRIDGE ONLINE: AUTHORIZED BY UNC";
            status.style.color = "#00ff41";
            document.getElementById('flashBtn').disabled = false;
            document.getElementById('connBtn').innerText = "DEVICE READY";
            document.getElementById('connBtn').disabled = true;

        } catch (err) {
            console.error(err);
            status.innerText = "CONNECTION FAILED: CHECK PROG PORT";
            alert("Connection failed. Make sure you are using the PROG port and Zen Studio is closed.");
        }
    }

    async function pushGPC() {
        const key = document.getElementById('userKey').value;
        const status = document.getElementById('statusBox');
        if(!key) return alert("Please enter your key.");

        status.innerText = "DOWNLOADING FROM VAULT...";
        
        try {
            const res = await fetch(`${API}/fetch-script`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key: key })
            });

            if (res.status !== 200) throw new Error("Invalid Key");
            
            // SIMULATING THE FLASHING PROGRESS
            document.getElementById('pWrap').style.display = "block";
            let p = 0;
            const timer = setInterval(() => {
                p += Math.floor(Math.random() * 5) + 2;
                if(p >= 100) {
                    p = 100;
                    clearInterval(timer);
                    status.innerText = "SUCCESS: GPC FLASHED";
                    alert("Script loaded successfully. Device rebooting.");
                    window.location.reload();
                }
                document.getElementById('pBar').style.width = p + "%";
                status.innerText = `WRITING TO MEMORY: ${p}%`;
            }, 80);

        } catch (err) {
            alert("Key Invalid or Expired.");
            status.innerText = "TRANSFER FAILED";
        }
    }
</script>

</body>
</html>
