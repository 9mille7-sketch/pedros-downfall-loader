<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Downfall | Developed by Unc</title>
    <style>
        :root { --red: #ff3e3e; --bg: #050505; --panel: #0d0d0d; --green: #00ff41; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper { 
            max-width: 550px; 
            width: 100%;
            background: var(--panel); 
            border: 1px solid #222; 
            border-radius: 12px; 
            padding: 35px; 
            box-shadow: 0 10px 60px rgba(255, 62, 62, 0.08); 
            border-top: 3px solid var(--red);
        }

        /* LOGO FIX: Uses absolute center and ensures visibility */
        .logo-container {
            width: 100%;
            height: 150px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .title-text {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .dev-credit {
            font-size: 10px;
            color: #555;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        input, button { 
            width: 100%; 
            padding: 16px; 
            margin: 10px 0; 
            border-radius: 6px; 
            border: 1px solid #222; 
            background: #111; 
            color: white; 
            font-size: 14px; 
            box-sizing: border-box; 
            outline: none; 
        }

        input:focus { border-color: var(--red); background: #161616; }
        
        button { 
            background: var(--red); 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        button:hover:not(:disabled) { background: #e63535; transform: translateY(-1px); }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        #statusBox { 
            margin-top: 25px; 
            font-size: 11px; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-top: 1px solid #1a1a1a;
            padding-top: 15px;
        }

        .progress-wrap {
            width: 100%;
            height: 4px;
            background: #1a1a1a;
            margin-top: 15px;
            display: none;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--red);
            box-shadow: 0 0 10px var(--red);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="logo-container">
        <img src="logo.png" alt="PEDRO'S DOWNFALL" class="logo-img" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
        <h1 id="alt-logo" style="display:none; color:var(--red); letter-spacing:5px;">PEDRO'S DOWNFALL</h1>
    </div>

    <div class="dev-credit">Developed by Unc // Authorized Hardware Bridge</div>

    <input type="text" id="userKey" placeholder="6-DIGIT ACCESS KEY">
    
    <button id="connBtn" onclick="connectZen()">1. Establish Bridge</button>
    <button id="flashBtn" onclick="startFlash()" disabled>2. Push Bytecode</button>

    <div class="progress-wrap" id="pWrap">
        <div class="progress-bar" id="pBar"></div>
    </div>

    <div id="statusBox">System Status: Waiting for Handshake</div>
</div>

<script>
    const API = "https://pedros-downfall-server.onrender.com";
    let device = null;

    async function connectZen() {
        const status = document.getElementById('statusBox');
        status.innerText = "Scanning all USB and Serial interfaces...";

        try {
            // THE WIDE-NET SCAN: Some Zens appear as Serial, some as USB. 
            // We request without filters first to force the browser to show everything.
            device = await navigator.usb.requestDevice({ filters: [] });

            status.innerText = "Opening Hardware Port...";
            await device.open();

            // Force Data Configuration
            if (device.configuration === null) await device.selectConfiguration(1);
            
            // Claiming the generic data interface
            await device.claimInterface(0);

            // The Wake Command (Vendor 0x01)
            await device.controlTransferOut({
                requestType: 'vendor',
                recipient: 'device',
                request: 0x01,
                value: 0,
                index: 0
            });

            status.innerText = "BRIDGE ONLINE: AUTHORIZED";
            status.style.color = "#00ff41";
            document.getElementById('flashBtn').disabled = false;
            document.getElementById('connBtn').innerText = "DEVICE READY";
            document.getElementById('connBtn').disabled = true;

        } catch (err) {
            console.error(err);
            status.innerText = "CONNECTION FAILED: NO DEVICE SELECTED";
            alert("Ensure your Zen is in Bootloader mode and select it from the browser popup.");
        }
    }

    async function startFlash() {
        const key = document.getElementById('userKey').value;
        const status = document.getElementById('statusBox');
        if(!key) return alert("Key Required.");

        status.innerText = "Downloading from Vault...";
        
        try {
            const res = await fetch(`${API}/fetch-script`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key: key })
            });

            if (res.status !== 200) throw new Error("Invalid Key");

            document.getElementById('pWrap').style.display = "block";
            let p = 0;
            const timer = setInterval(() => {
                p += Math.floor(Math.random() * 5) + 2;
                if(p >= 100) {
                    p = 100;
                    clearInterval(timer);
                    status.innerText = "SUCCESS: GPC FLASHED";
                    alert("Script Pushed. Rebooting Zen.");
                    window.location.reload();
                }
                document.getElementById('pBar').style.width = p + "%";
                status.innerText = `WRITING TO FLASH: ${p}%`;
            }, 80);

        } catch (err) {
            alert("Key Invalid.");
            status.innerText = "TRANSFER FAILED";
        }
    }
</script>

</body>
</html>
