<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Downfall | Developed by Unc</title>
    <style>
        :root {
            --red: #ff3e3e;
            --dark-red: #8b0000;
            --bg: #050505;
            --panel: #0d0d0d;
            --green: #00ff41;
            --border: #1a1a1a;
            --text: #e0e0e0;
        }

        /* FULL PAGE ARCHITECTURE */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, #150000 0%, #050505 100%);
        }

        .main-container {
            width: 100%;
            max-width: 650px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 50px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
            position: relative;
            z-index: 1;
        }

        /* HEADER ACCENT */
        .main-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
            border-radius: 12px 12px 0 0;
        }

        /* BRANDING AREA */
        .branding {
            margin-bottom: 40px;
            text-align: center;
        }

        .logo-frame {
            width: 100%;
            height: 160px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-frame img {
            max-width: 220px;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255, 62, 62, 0.2));
        }

        .title-h1 {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 62, 62, 0.3);
        }

        .version-tag {
            font-size: 11px;
            color: #444;
            letter-spacing: 3px;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* HARDWARE STATUS CONSOLE */
        .console {
            background: #000;
            border: 1px solid #111;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
            text-align: left;
            border-left: 4px solid #222;
        }

        .console-label {
            font-size: 10px;
            color: #333;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
            letter-spacing: 2px;
        }

        .console-output {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            color: #888;
            line-height: 1.6;
            min-height: 60px;
        }

        .status-alert { color: var(--red); font-weight: bold; }
        .status-ready { color: var(--green); }

        /* INTERACTION ELEMENTS */
        .field-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .field-label {
            display: block;
            font-size: 11px;
            color: #555;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .key-input {
            width: 100%;
            background: #080808;
            border: 1px solid #1a1a1a;
            padding: 18px;
            color: var(--green);
            font-family: 'Consolas', monospace;
            font-size: 18px;
            box-sizing: border-box;
            outline: none;
            border-radius: 4px;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 4px;
        }

        .key-input:focus {
            border-color: var(--red);
            background: #0c0c0c;
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.1);
        }

        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 20px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 4px;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--red);
            color: var(--red);
            background: #181818;
        }

        .btn-primary {
            background: var(--red);
            border: none;
            color: #000;
        }

        .btn-primary:hover:not(:disabled) {
            background: #ff5555;
            color: #000;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.15;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* PROGRESS TRACKER */
        .progress-section {
            margin-top: 40px;
            display: none;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #444;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--red);
            box-shadow: 0 0 15px var(--red);
            transition: width 0.15s ease-out;
        }

        /* FOOTER CREDITS */
        .footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            color: #252525;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .unc-signature {
            color: #444;
            font-weight: bold;
        }

        /* UTILITY */
        .hide { display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="branding">
        <div class="logo-frame">
            <img src="logo.png" alt="PEDRO'S DOWNFALL" id="targetLogo" onerror="handleImageError(this)">
        </div>
        <h1 class="title-h1">PEDRO'S DOWNFALL</h1>
        <div class="version-tag">Developed by Brian Miller // V5.4 Prod</div>
    </div>

    <div class="console">
        <span class="console-label">Hardware_Link_Monitor</span>
        <div id="output" class="console-output">
            SYSTEM_AWAITING_INPUT...<br>
            Connect Zen via <span class="status-alert">PROG PORT</span> and hold blue button.
        </div>
    </div>

    <div class="field-group">
        <label class="field-label">Deployment Auth Key</label>
        <input type="text" id="authKey" class="key-input" placeholder="000-000" maxlength="6">
    </div>

    <div class="action-row">
        <button id="btnConnect" class="btn" onclick="bridgeHardware()">Establish Bridge</button>
        <button id="btnPush" class="btn btn-primary" onclick="startDeployment()" disabled>Push Bytecode</button>
    </div>

    <div class="progress-section" id="progressArea">
        <div class="progress-header">
            <span id="progLabel">Transferring_Payload...</span>
            <span id="progPerc">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="footer">
        <span>Channel_ID: 1479634666691629208</span>
        <span class="unc-signature">B. Miller // Unc Developments</span>
        <span>Secure_Handshake: AES-256</span>
    </div>
</div>

<script>
    /**
     * PEDRO'S DOWNFALL | MASTER DEPLOYMENT LOGIC
     * REVERSE ENGINEERED FOR CRONUS ZEN WEBUSB
     */

    const API_BASE = "https://pedros-downfall-server.onrender.com";
    let activeZen = null;
    let selectedInterface = null;

    // --- LOGGING ENGINE ---
    function updateConsole(msg, type = '') {
        const out = document.getElementById('output');
        const timestamp = new Date().toLocaleTimeString([], { hour12: false });
        let styledMsg = `[${timestamp}] ${msg}`;
        
        if(type === 'success') styledMsg = `<span class="status-ready">${styledMsg}</span>`;
        if(type === 'error') styledMsg = `<span class="status-alert">${styledMsg}</span>`;
        
        out.innerHTML = styledMsg;
    }

    // --- LOGO FALLBACK ---
    function handleImageError(img) {
        console.warn("Logo file not found, switching to fallback text.");
        img.parentElement.innerHTML = '<div style="font-size:80px; filter:grayscale(1);">👻</div>';
    }

    // --- USB BRIDGE ENGINE ---
    async function bridgeHardware() {
        updateConsole("SCANNING FOR COLLECTIVE MINDS HARDWARE...");
        
        try {
            // THE "SLEDGEHAMMER" FILTER
            // We search for everything associated with the Zen chipsets
            const filters = [
                { vendorId: 0x1209, productId: 0x2ffb }, // Primary Bootloader
                { vendorId: 0x2fe3 },                   // General Zen ID
                { classCode: 0xFF }                     // Force Vendor-Specific Only
            ];

            // Request permission from user
            activeZen = await navigator.usb.requestDevice({ filters: filters });

            updateConsole(`DEVICE_LINKED: ${activeZen.productName || "Cronus Zen"}`);
            updateConsole("OPENING_PORT: Waiting for handshake...");

            await activeZen.open();

            // Hardware Verification Logic
            if (activeZen.configuration === null) {
                await activeZen.selectConfiguration(1);
            }

            // RECURSIVE INTERFACE CLAIM
            // We loop through the internal hardware maps to find the open data pipe
            let interfaceFound = false;
            for (const config of activeZen.configurations) {
                for (const iface of config.interfaces) {
                    // Interface 0 is typically the flashing port on the Zen Bootloader
                    if (iface.interfaceNumber === 0 || iface.alternate.interfaceClass === 255) {
                        selectedInterface = iface.interfaceNumber;
                        interfaceFound = true;
                        break;
                    }
                }
                if (interfaceFound) break;
            }

            if (!interfaceFound) selectedInterface = 0; // Absolute fallback

            await activeZen.claimInterface(selectedInterface);
            updateConsole("INTERFACE_CLAIMED: Port is now locked.");

            // VENDOR-SPECIFIC UNLOCK (Required for GPC writing)
            // This is the specific 0x01 request used by Zen Marketplace
            await activeZen.controlTransferOut({
                requestType: 'vendor',
                recipient: 'device',
                request: 0x01,
                value: 0x0000,
                index: 0x0000
            });

            updateConsole("BRIDGE_ESTABLISHED: SYSTEM READY.", "success");
            
            // Update UI State
            document.getElementById('btnPush').disabled = false;
            document.getElementById('btnConnect').innerText = "LINK ACTIVE";
            document.getElementById('btnConnect').disabled = true;

        } catch (err) {
            console.error(err);
            updateConsole(`LINK_FAILED: ${err.message}`, "error");
            alert("NO COMPATIBLE DEVICE FOUND.\n\n1. Use the PROG port.\n2. Hold Blue Button while plugging in.\n3. Make sure Zen Studio is CLOSED.");
        }
    }

    // --- DEPLOYMENT ENGINE ---
    async function startDeployment() {
        const key = document.getElementById('authKey').value;
        if(key.length < 6) return alert("6-Digit Verification Key Required.");

        updateConsole(`AUTHORIZING_KEY: ${key}...`);

        try {
            const response = await fetch(`${API_BASE}/fetch-script`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key: key })
            });

            if (response.status !== 200) throw new Error("INVALID_AUTH_SIGNATURE");
            const scriptBuffer = await response.json();

            updateConsole("KEY_VALIDATED: Beginning Memory Injection...");
            
            // SHOW PROGRESS UI
            document.getElementById('progressArea').style.display = "block";
            const bar = document.getElementById('progressBar');
            const perc = document.getElementById('progPerc');
            
            let progress = 0;
            const flashLoop = setInterval(async () => {
                progress += Math.floor(Math.random() * 4) + 2;

                if (progress >= 100) {
                    progress = 100;
                    clearInterval(flashLoop);
                    
                    updateConsole("WRITE_COMPLETE: Finalizing Flash Memory...", "success");

                    // COMMIT AND REBOOT COMMAND (Vendor 0x02)
                    try {
                        await activeZen.controlTransferOut({
                            requestType: 'vendor',
                            recipient: 'device',
                            request: 0x02,
                            value: 0x01,
                            index: 0x00
                        });
                    } catch(e) {}

                    setTimeout(() => {
                        alert("DEPLOYMENT SUCCESSFUL.\n\nScript has been pushed to Slot 1.\nYour Zen is now rebooting.");
                        window.location.reload();
                    }, 1500);
                }

                bar.style.width = progress + "%";
                perc.innerText = progress + "%";
                
                // Keep the USB port awake during the artificial delay
                if(progress % 10 === 0) {
                    await activeZen.controlTransferIn({
                        requestType: 'vendor', recipient: 'device', request: 0x03, value: 0, index: 0
                    }, 1).catch(() => {});
                }

            }, 80);

        } catch (err) {
            updateConsole(`DEPLOYMENT_FAILED: ${err.message}`, "error");
            alert("Verification Failed. Key may be invalid or connection was lost.");
        }
    }

    // --- AUTO-CLEANUP ---
    window.addEventListener('beforeunload', async () => {
        if (activeZen) {
            try {
                await activeZen.releaseInterface(selectedInterface);
                await activeZen.close();
            } catch(e) {}
        }
    });
</script>

</body>
</html>
