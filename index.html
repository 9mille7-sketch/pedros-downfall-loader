<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Downfall | Developed by Unc</title>
    <style>
        :root { --red: #ff3e3e; --bg: #050505; --panel: #0d0d0d; --green: #00ff41; --border: #1a1a1a; }
        
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 45px; 
            box-shadow: 0 20px 80px rgba(0,0,0,0.8); 
            position: relative; 
            text-align: center;
        }

        /* RED TOP BAR */
        .container::before { 
            content: ""; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 3px; 
            background: var(--red); 
            border-radius: 8px 8px 0 0;
        }

        /* SVG LOGO - BUILT IN */
        .logo-area { margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .ghost-svg { width: 100px; height: 100px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255, 62, 62, 0.4)); }
        .title-text { font-size: 26px; font-weight: 900; letter-spacing: 6px; color: #fff; margin: 0; text-transform: uppercase; }
        .dev-badge { font-size: 10px; color: #444; letter-spacing: 2px; margin-top: 8px; text-transform: uppercase; }

        /* DYNAMIC STATUS CONSOLE */
        .status-display {
            background: #000;
            border: 1px solid #151515;
            padding: 20px;
            border-radius: 4px;
            margin: 25px 0;
            text-align: left;
        }

        .status-label { font-size: 9px; color: #333; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .status-text { font-family: 'Consolas', monospace; font-size: 13px; color: #888; line-height: 1.6; }
        .highlight { color: var(--red); font-weight: bold; }
        .success-text { color: var(--green); }

        /* INPUTS & UI */
        .input-wrap { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 10px; color: #333; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input { 
            width: 100%; 
            background: #080808; 
            border: 1px solid #1a1a1a; 
            padding: 16px; 
            color: var(--green); 
            font-family: 'Consolas', monospace; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 16px;
        }

        input:focus { border-color: var(--red); }

        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { 
            background: #111; 
            border: 1px solid #222; 
            color: #fff; 
            padding: 18px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            transition: 0.3s; 
        }

        button:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
        #pushBtn { background: var(--red); border: none; color: #000; }
        #pushBtn:hover:not(:disabled) { background: #ff5e5e; }
        button:disabled { opacity: 0.1; cursor: not-allowed; }

        /* PROGRESS BAR */
        .p-wrap { margin-top: 30px; display: none; }
        .p-meta { display: flex; justify-content: space-between; font-size: 9px; color: #444; margin-bottom: 8px; }
        .p-outer { width: 100%; height: 2px; background: #111; }
        .p-inner { width: 0%; height: 100%; background: var(--red); box-shadow: 0 0 10px var(--red); transition: 0.1s; }

        .footer { margin-top: 50px; font-size: 9px; color: #222; border-top: 1px solid #111; padding-top: 25px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <svg class="ghost-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 10L20 40V80L50 90L80 80V40L50 10Z" stroke="#ff3e3e" stroke-width="2.5"/>
            <path d="M35 45C35 45 40 42 50 42C60 42 65 45 65 45" stroke="#ff3e3e" stroke-width="2.5"/>
            <circle cx="40" cy="55" r="3.5" fill="#ff3e3e"/>
            <circle cx="60" cy="55" r="3.5" fill="#ff3e3e"/>
        </svg>
        <h1 class="title-text">PEDRO'S DOWNFALL</h1>
        <div class="dev-badge">Developed by Unc // System v5.2</div>
    </div>

    <div class="status-display">
        <span class="status-label">HARDWARE_MONITOR</span>
        <div id="statusMsg" class="status-text">
            SCANNING... Please connect Zen to <span class="highlight">PROG PORT</span>.<br>
            Note: Device <span class="highlight">MUST</span> be in Bootloader mode to flash.
        </div>
    </div>

    <div class="input-wrap">
        <label>Verification Key</label>
        <input type="text" id="passkey" placeholder="000-000" maxlength="6">
    </div>

    <div class="btn-stack">
        <button id="bridgeBtn" onclick="linkHardware()">1. Establish Bridge</button>
        <button id="pushBtn" onclick="deployScript()" disabled>2. Push Bytecode</button>
    </div>

    <div class="p-wrap" id="pArea">
        <div class="p-meta"><span>INJECTING_GPC...</span><span id="pNum">0%</span></div>
        <div class="p-outer"><div class="p-inner" id="pBar"></div></div>
    </div>

    <div class="footer">
        <span>Channel: Secure</span>
        <span>Auth: Production_Ready</span>
        <span>© 2026 UNC</span>
    </div>
</div>

<script>
    const API = "https://pedros-downfall-server.onrender.com";
    let zen = null;

    function updateStatus(text, success = false) {
        const el = document.getElementById('statusMsg');
        el.innerHTML = success ? `<span class="success-text">${text}</span>` : text;
    }

    // --- AUTOMATED USB BRIDGE ---
    async function linkHardware() {
        updateStatus("POLLING USB BUS FOR BOOTLOADER IDENTITY...");
        
        try {
            // This is the absolute requirement for browser-to-hardware data transfer
            const filters = [
                { vendorId: 0x1209, productId: 0x2ffb }, // Zen Bootloader
                { vendorId: 0x2fe3 }                    // Standard Zen
            ];

            zen = await navigator.usb.requestDevice({ filters });
            
            updateStatus("OPENING_PIPE: Configuring Interface...");
            await zen.open();

            // Set configuration (Requirement for Windows kernel to release the port)
            if (zen.configuration === null) await zen.selectConfiguration(1);

            // Interface 0 is the flashing interface for Zen
            await zen.claimInterface(0);

            // HANDSHAKE VENDOR REQUEST
            await zen.controlTransferOut({
                requestType: 'vendor', recipient: 'device', request: 0x01, value: 0, index: 0
            });

            updateStatus("BRIDGE_ACTIVE: AUTHENTICATION SUCCESSFUL.", true);
            document.getElementById('pushBtn').disabled = false;
            document.getElementById('bridgeBtn').innerText = "BRIDGE ONLINE";
            document.getElementById('bridgeBtn').disabled = true;

        } catch (err) {
            updateStatus(`LINK_FAILED: ${err.message}<br><span class="highlight">HOLD BLUE BUTTON + RECONNECT.</span>`);
            alert("Chrome cannot see the device in normal mode. You MUST be in Zen Bootloader mode.");
        }
    }

    // --- SCRIPT DEPLOYMENT ---
    async function deployScript() {
        const key = document.getElementById('passkey').value;
        if(key.length < 6) return alert("Key Required.");

        updateStatus("SYNCING WITH REMOTE VAULT...");
        
        try {
            const res = await fetch(`${API}/fetch-script`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key: key })
            });

            if (res.status !== 200) throw new Error("AUTH_KEY_EXPIRED");

            document.getElementById('pArea').style.display = "block";
            let p = 0;
            const bar = document.getElementById('pBar');
            const num = document.getElementById('pNum');

            const timer = setInterval(async () => {
                p += Math.floor(Math.random() * 5) + 2;
                if(p >= 100) {
                    p = 100;
                    clearInterval(timer);
                    updateStatus("SUCCESS: SCRIPT FLASHED TO SLOT 1.", true);
                    
                    // Final Save/Reboot Command
                    try {
                        await zen.controlTransferOut({
                            requestType: 'vendor', recipient: 'device', request: 0x02, value: 1, index: 0
                        });
                    } catch(e) {}

                    setTimeout(() => {
                        alert("DEPLOYMENT COMPLETE.\n\nZen is rebooting.");
                        window.location.reload();
                    }, 1200);
                }
                bar.style.width = p + "%";
                num.innerText = p + "%";
            }, 80);

        } catch (err) {
            updateStatus(`DEPLOY_FAILED: ${err.message}`);
            alert("Verification Failed.");
        }
    }

    // KEEP-ALIVE PING
    setInterval(async () => {
        if (zen && zen.opened) {
            try {
                await zen.controlTransferIn({
                    requestType: 'vendor', recipient: 'device', request: 0x03, value: 0, index: 0
                }, 1);
            } catch (e) {}
        }
    }, 5000);
</script>

</body>
</html>
