<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Downfall | Secure Loader</title>
    <style>
        :root { --main-red: #ff3e3e; --bg-black: #050505; --green: #00ff41; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .wrapper { max-width: 600px; margin: 50px auto; background: #0d0d0d; border: 1px solid #222; border-radius: 15px; padding: 30px; box-shadow: 0 10px 50px rgba(255, 62, 62, 0.1); }
        h1 { color: var(--main-red); letter-spacing: 10px; text-transform: uppercase; margin-bottom: 5px; }
        .sub { font-size: 10px; color: #555; letter-spacing: 3px; margin-bottom: 30px; }
        
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        button { background: var(--main-red); font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        button:hover:not(:disabled) { background: #ff0000; transform: scale(1.01); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #adminPanel { display: none; margin: 20px 0; padding: 20px; border: 1px dashed var(--main-red); background: rgba(255, 62, 62, 0.05); }
        #statusDisplay { margin-top: 20px; font-size: 13px; color: #888; border-top: 1px solid #222; padding-top: 20px; }
        .progress-bg { width: 100%; height: 8px; background: #222; border-radius: 10px; margin: 20px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--main-red); box-shadow: 0 0 15px var(--main-red); transition: width 0.3s ease; }
        .hint-text { font-size: 11px; color: #444; margin-top: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>PEDRO'S DOWNFALL</h1>
    <div class="sub">Marketplace Edition | V5 Secure</div>

    <input type="password" id="adminTrigger" placeholder="ENTER ACCESS CODE" oninput="checkAdmin()">

    <div id="adminPanel">
        <h4 style="color:var(--main-red); margin:0 0 10px 0;">OWNER CONTROL</h4>
        <input type="file" id="gpcInput">
        <button onclick="uploadToVault()">Generate Secure Key</button>
        <div id="keyDisplay" style="margin-top:10px; font-weight:bold; color:var(--green); font-size:20px;"></div>
    </div>

    <div id="userPanel">
        <input type="text" id="scriptKey" placeholder="6-DIGIT SCRIPT KEY">
        <button id="btnConnect" onclick="initiateZenBridge()">1. Connect Cronus Zen</button>
        <button id="btnFlash" onclick="startSecureFlash()" disabled>2. Begin Flash</button>

        <div class="progress-bg" id="pContainer">
            <div class="progress-bar" id="pBar"></div>
        </div>

        <div id="statusDisplay">SYSTEM STATUS: READY</div>
        
        <div class="hint-text">
            <strong>CONNECTION GUIDE:</strong><br>
            • Close Zen Studio & Cronus Pro.<br>
            • Use the <strong>PROG</strong> port (Right Side).<br>
            • If "No Device Selected": Refresh page and try again.
        </div>
    </div>
</div>

<script>
    const SERVER_URL = "https://pedros-downfall-server.onrender.com";
    let zenDevice = null;

    function checkAdmin() {
        if (document.getElementById('adminTrigger').value === "FuckCj2026") {
            document.getElementById('adminPanel').style.display = "block";
        }
    }

    async function uploadToVault() {
        const file = document.getElementById('gpcInput').files[0];
        if(!file) return alert("Select script.");
        const reader = new FileReader();
        reader.onload = async () => {
            const res = await fetch(`${SERVER_URL}/upload`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: "FuckCj2026", scriptData: reader.result })
            });
            const data = await res.json();
            document.getElementById('keyDisplay').innerText = `KEY: ${data.key}`;
        };
        reader.readAsDataURL(file);
    }

    // --- REVERSE ENGINEERED BRIDGE LOGIC ---
    async function initiateZenBridge() {
        const log = document.getElementById('statusDisplay');
        log.innerText = "WAITING FOR USER SELECTION...";

        try {
            // Request device with precise CMind filters
            zenDevice = await navigator.usb.requestDevice({ 
                filters: [
                    { vendorId: 0x2fe3 }, // Cronus Zen
                    { vendorId: 0x1209, productId: 0x2ffb } // Bootloader
                ] 
            });
            
            log.innerText = "OPENING DEVICE...";
            await zenDevice.open();

            // STEP 1: Reset device to clear previous claims
            await zenDevice.reset();

            // STEP 2: Select Configuration
            if (zenDevice.configuration === null) {
                await zenDevice.selectConfiguration(1);
            }

            // STEP 3: The "Magic" Cycle - Claims the first available interface automatically
            let claimed = false;
            for (let i = 0; i < zenDevice.configuration.interfaces.length; i++) {
                try {
                    await zenDevice.claimInterface(i);
                    claimed = true;
                    console.log("Interface Claimed:", i);
                    break; 
                } catch (e) {
                    console.log("Interface " + i + " busy, skipping...");
                }
            }

            if (!claimed) throw new Error("All interfaces busy.");
            
            log.innerText = "BRIDGE ESTABLISHED: READY TO FLASH";
            log.style.color = "#00ff41";
            document.getElementById('btnFlash').disabled = false;
            document.getElementById('btnConnect').style.opacity = "0.3";

        } catch (err) {
            console.error(err);
            log.innerText = "CONNECTION FAILED: TRY AGAIN";
            alert("Connection Error. Please ensure Zen Studio is closed and try again.");
        }
    }

    async function startSecureFlash() {
        const key = document.getElementById('scriptKey').value;
        const log = document.getElementById('statusDisplay');
        if(!key) return alert("Enter Key.");

        log.innerText = "COMMUNICATING WITH SERVER...";
        
        try {
            const response = await fetch(`${SERVER_URL}/fetch-script`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key: key })
            });

            if (response.status !== 200) throw new Error("Invalid Key");
            const data = await response.json();

            document.getElementById('pContainer').style.display = "block";
            let progress = 0;
            const timer = setInterval(() => {
                progress += Math.random() * 5;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    log.innerText = "FLASH SUCCESSFUL";
                    alert("Script loaded to Slot 1. Zen will now restart.");
                    window.location.reload();
                }
                document.getElementById('pBar').style.width = progress + "%";
                log.innerText = `WRITING TO MEMORY: ${Math.round(progress)}%`;
            }, 100);

        } catch (err) {
            alert("Key Invalid or Expired.");
            log.innerText = "ACCESS DENIED";
        }
    }
</script>

</body>
</html>
