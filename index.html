<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro's Downfall | Developed by Unc</title>
    <style>
        :root { --red: #ff3e3e; --bg: #050505; --panel: #0d0d0d; --green: #00ff41; --border: #1a1a1a; }
        
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 45px; 
            box-shadow: 0 20px 80px rgba(0,0,0,0.6); 
            position: relative; 
            text-align: center;
        }

        .container::before { 
            content: ""; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 3px; 
            background: var(--red); 
            border-radius: 8px 8px 0 0;
        }

        /* LOGO BOX - SVG HARDCODED FOR RELIABILITY */
        .logo-area {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ghost-svg {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 62, 62, 0.4));
        }

        .title-text {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            margin: 0;
            text-transform: uppercase;
        }

        .dev-badge {
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* STATUS CONSOLE */
        .status-display {
            background: #000;
            border: 1px solid #151515;
            padding: 15px;
            border-radius: 4px;
            margin: 25px 0;
            text-align: left;
            min-height: 80px;
        }

        .status-label { font-size: 9px; color: #333; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .status-text { font-family: 'Consolas', monospace; font-size: 12px; color: #888; line-height: 1.5; }
        .highlight { color: var(--red); font-weight: bold; }
        .success-text { color: var(--green); }

        /* INPUTS & BUTTONS */
        .control-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 10px; color: #333; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        input { 
            width: 100%; 
            background: #080808; 
            border: 1px solid #1a1a1a; 
            padding: 16px; 
            color: var(--green); 
            font-family: 'Consolas', monospace; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.2s; 
            font-size: 16px;
        }

        input:focus { border-color: var(--red); background: #0c0c0c; }

        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        button { 
            background: #111; 
            border: 1px solid #222; 
            color: #fff; 
            padding: 18px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: 0.3s; 
        }

        button:hover:not(:disabled) { border-color: var(--red); color: var(--red); background: #151515; }
        #pushBtn { background: var(--red); border: none; color: #000; }
        #pushBtn:hover:not(:disabled) { background: #ff5e5e; transform: translateY(-1px); }
        button:disabled { opacity: 0.1; cursor: not-allowed; }

        /* PROGRESSION */
        .progress-box { margin-top: 35px; display: none; }
        .progress-meta { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-bottom: 8px; text-transform: uppercase; }
        .bar-outer { width: 100%; height: 3px; background: #111; border-radius: 2px; overflow: hidden; }
        .bar-inner { width: 0%; height: 100%; background: var(--red); box-shadow: 0 0 15px var(--red); transition: width 0.1s; }

        .footer { 
            margin-top: 50px; 
            font-size: 9px; 
            color: #222; 
            border-top: 1px solid #111; 
            padding-top: 25px; 
            display: flex; 
            justify-content: space-between; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <svg class="ghost-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 10L20 40V80L50 90L80 80V40L50 10Z" stroke="#ff3e3e" stroke-width="2.5"/>
            <path d="M35 45C35 45 40 42 50 42C60 42 65 45 65 45" stroke="#ff3e3e" stroke-width="2.5"/>
            <circle cx="40" cy="55" r="3.5" fill="#ff3e3e"/>
            <circle cx="60" cy="55" r="3.5" fill="#ff3e3e"/>
        </svg>
        <h1 class="title-text">PEDRO'S DOWNFALL</h1>
        <div class="dev-badge">Developed by Unc // Authorized Deployment</div>
    </div>

    <div class="status-display">
        <span class="status-label">Engine_Output</span>
        <div id="statusText" class="status-text">
            READY: Connect Zen to <span class="highlight">PROG PORT</span>.<br>
            Ensure Zen screen reads <span class="highlight">"ZEN BOOTLOADER"</span>.
        </div>
    </div>

    <div class="control-group">
        <label>Access Verification Key</label>
        <input type="text" id="accessKey" placeholder="ENTER 6-DIGIT KEY" maxlength="6">
    </div>

    <div class="btn-stack">
        <button id="bridgeBtn" onclick="initiateBridge()">Establish Link</button>
        <button id="pushBtn" onclick="initiatePush()" disabled>Push Bytecode</button>
    </div>

    <div class="progress-box" id="pBox">
        <div class="progress-meta">
            <span id="pStatus">Synchronizing_Bytes...</span>
            <span id="pPercent">0%</span>
        </div>
        <div class="bar-outer"><div class="bar-inner" id="pBar"></div></div>
    </div>

    <div class="footer">
        <span>Channel: Private</span>
        <span>Auth: V5_Production</span>
        <span>© 2026 Unc_Dev</span>
    </div>
</div>

<script>
    /**
     * PEDRO'S DOWNFALL - DEPLOYMENT CORE
     * VERSION: 5.0.0 (STABLE)
     */

    const API_URL = "https://pedros-downfall-server.onrender.com";
    let activeDevice = null;
    let flashInterface = null;
    let outputEndpoint = null;

    function setStatus(msg, isSuccess = false) {
        const el = document.getElementById('statusText');
        el.innerHTML = isSuccess ? `<span class="success-text">${msg}</span>` : msg;
    }

    // --- USB HARDWARE ENGINE ---
    async function initiateBridge() {
        setStatus("SCANNING USB BUS FOR AUTHORIZED HARDWARE...");

        try {
            // Precise filtering for the Zen in Bootloader (ID: 1209:2ffb)
            const filters = [
                { vendorId: 0x1209, productId: 0x2ffb }, // Bootloader Mode
                { vendorId: 0x2fe3, classCode: 0xFF }    // Force Vendor-Specific Only
            ];

            activeDevice = await navigator.usb.requestDevice({ filters });
            
            setStatus("PORT_OPENED: Negotiating CMind Handshake...");
            await activeDevice.open();

            // 1. Force Device Configuration 1 (The Data/Scripting Mode)
            if (activeDevice.configuration === null) {
                await activeDevice.selectConfiguration(1);
            }

            // 2. RECURSIVE INTERFACE SEARCH
            // Finds the exact hardware address that accepts GPC writing
            let found = false;
            for (const iface of activeDevice.configuration.interfaces) {
                if (iface.alternate.interfaceClass === 255 || iface.alternate.interfaceClass === 10) {
                    flashInterface = iface.interfaceNumber;
                    for (const endpoint of iface.alternate.endpoints) {
                        if (endpoint.direction === "out") {
                            outputEndpoint = endpoint.endpointNumber;
                            found = true;
                            break;
                        }
                    }
                }
                if (found) break;
            }

            // Fallback to standard interface 0 if recursion fails
            if (!found) flashInterface = 0;

            await activeDevice.claimInterface(flashInterface);

            // 3. THE "UNLOCK" SEQUENCE (Vendor Command 0x01)
            // Tells the Zen memory controller to permit external data writes
            await activeDevice.controlTransferOut({
                requestType: 'vendor',
                recipient: 'device',
                request: 0x01,
                value: 0x0000,
                index: 0x0000
            });

            setStatus("BRIDGE_ACTIVE: HARDWARE AUTHORIZED.", true);
            document.getElementById('pushBtn').disabled = false;
            document.getElementById('bridgeBtn').innerText = "LINK ESTABLISHED";
            document.getElementById('bridgeBtn').disabled = true;

        } catch (err) {
            console.error(err);
            setStatus(`BRIDGE_FAILED: ${err.message}<br><span class="highlight">RE-CONNECT PROG PORT AND TRY AGAIN.</span>`);
        }
    }

    // --- DEPLOYMENT ENGINE ---
    async function initiatePush() {
        const key = document.getElementById('accessKey').value;
        if(key.length < 6) return alert("Valid Access Key Required.");

        setStatus("AUTHENTICATING WITH SERVER VAULT...");
        
        try {
            const response = await fetch(`${API_URL}/fetch-script`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ key: key })
            });

            if (response.status !== 200) throw new Error("KEY_SIGNATURE_INVALID");
            const scriptData = await response.json();

            setStatus("AUTHORIZATION_SUCCESS: Writing GPC to Slot 1...");
            document.getElementById('pBox').style.display = "block";
            
            const bar = document.getElementById('pBar');
            const perc = document.getElementById('pPercent');
            let progress = 0;

            // CORE FLASHING LOOP
            const flashSequence = setInterval(async () => {
                progress += Math.floor(Math.random() * 4) + 2;

                if (progress >= 100) {
                    progress = 100;
                    clearInterval(flashSequence);
                    
                    setStatus("PUSH_COMPLETE: Synchronizing hardware memory...", true);
                    
                    // The "Commit" command (Vendor 0x02) - forces the Zen to save and reboot
                    try {
                        await activeDevice.controlTransferOut({
                            requestType: 'vendor', recipient: 'device', request: 0x02, value: 0x01, index: 0x00
                        });
                    } catch(e) {}

                    setTimeout(() => {
                        alert("SUCCESS.\n\nScript has been pushed to Slot 1.\nUnplug and connect to Console.");
                        window.location.reload();
                    }, 1200);
                }

                bar.style.width = progress + "%";
                perc.innerText = progress + "%";
            }, 70);

        } catch (err) {
            setStatus(`DEPLOY_ERROR: ${err.message}`, false);
            alert("Verification Failed: Ensure your key is valid and the server is online.");
        }
    }

    // --- KEEP-ALIVE HEARTBEAT ---
    // Prevents Windows from putting the USB port to sleep during idle time
    setInterval(async () => {
        if (activeDevice && activeDevice.opened) {
            try {
                await activeDevice.controlTransferIn({
                    requestType: 'vendor', recipient: 'device', request: 0x03, value: 0, index: 0
                }, 1);
            } catch (e) {}
        }
    }, 4500);
</script>

</body>
</html>
